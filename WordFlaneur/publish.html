<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publish — WordFlaneur</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- ===== HEADER ===== -->
        <header>
            <div class="logo"><a href="index.html">📜 Word<span>Flaneur</span></a></div>
            <nav>
                <a href="index.html">Home</a>
                <a href="library.html">Library</a>
                <a href="about.html">About</a>
                <a href="dashboard.html">Dashboard</a>
            </nav>
            <div id="auth-section">
                <span id="user-greeting">Guest</span>
                <button class="btn-outline" id="login-btn" onclick="handleLogin()">Sign In</button>
                <button class="btn-outline hidden" id="logout-btn" onclick="handleLogout()">Logout</button>
                <button class="btn" id="publish-btn" onclick="window.location.href='publish.html'" style="display:none;">✍️ Publish</button>
            </div>
        </header>

        <!-- ===== PUBLISH FORM ===== -->
        <div style="max-width: 800px; margin: 30px auto; background: #ffffff; padding: 30px; border-radius: 20px; border: 1px solid #e8ddd0;">
            <h2 style="color: #3d2b1f;">📖 Publish a New Story</h2>
            <p style="color: #7a6b5a;">Share your story with the world. Take your time—weekly updates are enough.</p>
            <hr style="margin: 20px 0; border: 1px solid #ede6db;">

            <form id="publish-form">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" id="story-title" placeholder="Enter story title">
                </div>
                <div class="form-group">
                    <label>Pen Name *</label>
                    <input type="text" id="story-author" placeholder="Your pen name">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="story-desc" rows="4" placeholder="Describe your story..."></textarea>
                </div>
                <div class="form-group">
                    <label>Cover Image URL</label>
                    <input type="url" id="cover-url" placeholder="https://example.com/cover.jpg">
                    <p style="font-size: 12px; color: #7a6b5a;">Upload to ImgBB for free and paste the direct link here.</p>
                </div>
                <div class="form-group">
                    <label>Tags (comma separated)</label>
                    <input type="text" id="story-tags" placeholder="e.g. Dark Fantasy, Political, Slow Burn">
                </div>
                <div class="form-group">
                    <label>AI Disclosure *</label>
                    <select id="ai-disclosure">
                        <option value="human">100% Human-Written</option>
                        <option value="ai-assisted">AI-Assisted (Editing Only)</option>
                        <option value="ai-generated-edited">AI-Generated (With Human Editing)</option>
                        <option value="ai-generated-minimal">AI-Generated (Minimal Editing)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Translation Disclosure</label>
                    <select id="translation-disclosure">
                        <option value="none">Original English</option>
                        <option value="human-ai">Human-Written, AI-Translated</option>
                        <option value="human-human">Human-Written, Human-Translated</option>
                        <option value="ai-ai">AI-Generated, AI-Translated</option>
                        <option value="ai-human">AI-Generated, Human-Translated</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Content Warnings (optional)</label>
                    <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                        <label><input type="checkbox" value="violence"> Violence</label>
                        <label><input type="checkbox" value="gore"> Gore</label>
                        <label><input type="checkbox" value="sexual"> Sexual Content</label>
                        <label><input type="checkbox" value="language"> Strong Language</label>
                        <label><input type="checkbox" value="trauma"> Trauma</label>
                    </div>
                </div>
                <button type="button" class="btn-gold" onclick="handlePublish()" style="width: 100%; padding: 14px;">📤 Publish Story</button>
            </form>
        </div>

        <!-- ===== FOOTER ===== -->
        <footer style="margin-top: 40px; padding-top: 20px; border-top: 2px solid #d4c5a0; text-align: center; color: #7a6b5a; font-size: 14px;">
            <p>📜 WordFlaneur — It's OK to Be Slower.</p>
            <p><a href="about.html">About</a> · <a href="#">Privacy</a> · <a href="#">Terms</a> · <a href="#">Support</a></p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/database.js"></script>
    <script>
        async function handlePublish() {
            alert('Story published! (Demo)');
            window.location.href = 'library.html';
        }
        async function handleLogin() { window.location.href = 'login.html'; }
        async function handleLogout() { const r = await signOut(); if (r.success) window.location.reload(); else alert('Error signing out'); }
        async function checkAuth() {
            const r = await getCurrentUser();
            if (r.success && r.user) {
                const p = await getUserProfile(r.user.id);
                if (p.success) {
                    document.getElementById('user-greeting').textContent = `👋 ${p.profile.display_name || 'User'}`;
                    document.getElementById('login-btn').classList.add('hidden');
                    document.getElementById('logout-btn').classList.remove('hidden');
                    if (p.profile.role === 'admin' || p.profile.role === 'author') {
                        document.getElementById('publish-btn').style.display = 'inline-block';
                    }
                }
            }
        }
        checkAuth();
    </script>
</body>
</html>
