<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library — WordFlaneur</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- ============================================
    HEADER
    ============================================ -->
    <header>
      <div class="logo">
        <a href="index.html">📜 Word<span>Flaneur</span></a>
      </div>
      <nav>
        <a href="index.html">Home</a>
        <a href="library.html" class="active">Library</a>
        <a href="about.html">About</a>
        <a href="dashboard.html">Dashboard</a>
      </nav>
      <div id="auth-section">
        <span id="user-greeting">Guest</span>
        <button class="btn-outline" id="login-btn" onclick="handleLogin()">Sign In</button>
        <button class="btn-outline hidden" id="logout-btn" onclick="handleLogout()">Logout</button>
        <button class="btn" id="publish-btn" onclick="window.location.href='publish.html'" style="display:none;">✍️ Publish</button>
      </div>
    </header>

    <!-- ============================================
    PAGE TITLE
    ============================================ -->
    <h1 style="margin: 30px 0 10px 0; color: #3d2b1f;">📚 Library</h1>

    <!-- ============================================
    FILTERS
    ============================================ -->
    <div style="background: #ffffff; padding: 20px; border-radius: 16px; border: 1px solid #e8ddd0; margin-bottom: 25px;">
      <div style="display: flex; flex-wrap: wrap; gap: 15px; align-items: center;">
        <div style="flex: 1; min-width: 200px;">
          <label>Search</label>
          <input type="text" id="search-input" placeholder="Search stories..." style="margin: 0;">
        </div>
        <div style="flex: 1; min-width: 150px;">
          <label>Genre</label>
          <select id="genre-filter" style="margin: 0;">
            <option value="">All Genres</option>
          </select>
        </div>
        <div style="flex: 1; min-width: 150px;">
          <label>Sort By</label>
          <select id="sort-filter" style="margin: 0;">
            <option value="ris">RIS (Highest)</option>
            <option value="spotlights">Most Spotlights</option>
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
          </select>
        </div>
        <div style="flex: 0 0 auto;">
          <button class="btn" onclick="applyFilters()">Apply</button>
          <button class="btn-outline" onclick="resetFilters()">Reset</button>
        </div>
      </div>
    </div>

    <!-- ============================================
    RANKING TABS
    ============================================ -->
    <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;">
      <button class="btn-outline" data-view="all" onclick="setView('all')" style="background: #6b4f3c; color: #f4efe6;">All Stories</button>
      <button class="btn-outline" data-view="most-scouted" onclick="setView('most-scouted')">Most Scouted</button>
      <button class="btn-outline" data-view="rising" onclick="setView('rising')">Rising</button>
      <button class="btn-outline" data-view="hidden-gems" onclick="setView('hidden-gems')">Hidden Gems</button>
      <button class="btn-outline" data-view="curator-picks" onclick="setView('curator-picks')">Curator Picks</button>
      <button class="btn-outline" data-view="lost-found" onclick="setView('lost-found')">Lost & Found</button>
      <button class="btn-outline" data-view="promoted" onclick="setView('promoted')">Promoted</button>
    </div>

    <!-- ============================================
    STORY GRID
    ============================================ -->
    <div id="library-grid" class="grid">
      <p style="color: #7a6b5a; grid-column: 1 / -1;">Loading stories...</p>
    </div>

    <!-- ============================================
    FOOTER
    ============================================ -->
    <footer style="margin-top: 40px; padding-top: 20px; border-top: 2px solid #d4c5a0; text-align: center; color: #7a6b5a; font-size: 14px;">
      <p>📜 WordFlaneur — It's OK to Be Slower.</p>
      <p><a href="about.html">About</a> · <a href="#">Privacy</a> · <a href="#">Terms</a> · <a href="#">Support</a></p>
    </footer>
  </div>

  <!-- ============================================
  SCRIPTS
  ============================================ -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/database.js"></script>
  <script src="js/algorithm.js"></script>

  <script>
    // ============================================
    // LIBRARY LOGIC
    // ============================================

    let currentView = 'all';
    let currentStories = [];

    // Load stories
    async function loadStories() {
      const grid = document.getElementById('library-grid');
      grid.innerHTML = '<p style="color: #7a6b5a; grid-column: 1 / -1;">Loading stories...</p>';

      try {
        const result = await getStories();
        if (!result.success) throw new Error(result.error);

        currentStories = result.data;
        applyFilters();
      } catch (error) {
        grid.innerHTML = `<p style="color: #8b3a3a; grid-column: 1 / -1;">Error loading stories: ${error.message}</p>`;
      }
    }

    // Apply filters
    function applyFilters() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const genre = document.getElementById('genre-filter').value;
      const sortBy = document.getElementById('sort-filter').value;

      let filtered = currentStories.filter(story => {
        // Search filter
        if (search && !story.title.toLowerCase().includes(search)) return false;
        // Genre filter
        if (genre && story.tags) {
          const tags = story.tags.map(t => t.tags.name);
          if (!tags.includes(genre)) return false;
        }
        return true;
      });

      // Apply view filter
      if (currentView === 'hidden-gems') {
        filtered = filtered.filter(story => calculateRIS(story) < 50);
      } else if (currentView === 'rising') {
        const sevenDaysAgo = new Date();
        sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
        filtered = filtered.filter(story => new Date(story.created_at) > sevenDaysAgo);
        filtered.sort((a, b) => (b.spotlight_count || 0) - (a.spotlight_count || 0));
      } else if (currentView === 'most-scouted') {
        filtered.sort((a, b) => (b.spotlight_count || 0) - (a.spotlight_count || 0));
      } else if (currentView === 'lost-found') {
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
        filtered = filtered.filter(story => {
          const lastUpdated = new Date(story.last_updated);
          return lastUpdated < thirtyDaysAgo && calculateRIS(story) > 100;
        });
      } else if (currentView === 'curator-picks') {
        filtered.sort((a, b) => (b.shelf_appearance_count || 0) - (a.shelf_appearance_count || 0));
      } else {
        // Sort by selected sort
        if (sortBy === 'ris') filtered = sortByRIS(filtered);
        else if (sortBy === 'spotlights') filtered.sort((a, b) => (b.spotlight_count || 0) - (a.spotlight_count || 0));
        else if (sortBy === 'newest') filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        else if (sortBy === 'oldest') filtered.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
      }

      renderStories(filtered);
    }

    // Render stories
    function renderStories(stories) {
      const grid = document.getElementById('library-grid');

      if (stories.length === 0) {
        grid.innerHTML = '<p style="color: #7a6b5a; grid-column: 1 / -1;">No stories found.</p>';
        return;
      }

      let html = '';
      stories.forEach(story => {
        const ris = calculateRIS(story);
        html += `
          <div class="story-card">
            <img class="story-cover" src="${story.cover_url || 'https://via.placeholder.com/300x400/d4c5a0/6b4f3c?text=Cover'}" onerror="this.src='https://via.placeholder.com/300x400/d4c5a0/6b4f3c?text=Cover'">
            <div class="story-title"><a href="story.html?id=${story.id}">${story.title}</a></div>
            <div class="story-author">by ${story.profiles?.display_name || 'Unknown Author'}</div>
            <div class="story-meta">
              <span class="ris">RIS: ${ris}</span>
              <span class="spotlight-count">🔦 ${story.spotlight_count || 0}</span>
            </div>
            <div class="story-actions">
              <button class="btn-sm read" onclick="window.location.href='story.html?id=${story.id}'">Read</button>
            </div>
          </div>
        `;
      });

      grid.innerHTML = html;
    }

    // Set view
    function setView(view) {
      currentView = view;
      // Update button styles
      document.querySelectorAll('[data-view]').forEach(btn => {
        btn.style.background = btn.dataset.view === view ? '#6b4f3c' : 'transparent';
        btn.style.color = btn.dataset.view === view ? '#f4efe6' : '#6b4f3c';
      });
      applyFilters();
    }

    // Reset filters
    function resetFilters() {
      document.getElementById('search-input').value = '';
      document.getElementById('genre-filter').value = '';
      document.getElementById('sort-filter').value = 'ris';
      currentView = 'all';
      document.querySelectorAll('[data-view]').forEach(btn => {
        btn.style.background = btn.dataset.view === 'all' ? '#6b4f3c' : 'transparent';
        btn.style.color = btn.dataset.view === 'all' ? '#f4efe6' : '#6b4f3c';
      });
      applyFilters();
    }

    // ============================================
    // AUTH HANDLERS
    // ============================================

    async function handleLogin() { window.location.href = 'login.html'; }
    async function handleLogout() {
      const result = await signOut();
      if (result.success) window.location.reload();
      else alert('Error signing out: ' + result.error);
    }

    async function checkAuth() {
      const result = await getCurrentUser();
      if (result.success && result.user) {
        const profileResult = await getUserProfile(result.user.id);
        if (profileResult.success) {
          const profile = profileResult.profile;
          document.getElementById('user-greeting').textContent = `👋 ${profile.display_name || 'User'}`;
          document.getElementById('login-btn').classList.add('hidden');
          document.getElementById('logout-btn').classList.remove('hidden');
          if (profile.role === 'admin' || profile.role === 'author') {
            document.getElementById('publish-btn').style.display = 'inline-block';
          }
        }
      }
    }

    // ============================================
    // POPULATE GENRE FILTER
    // ============================================

    function populateGenreFilter() {
      const select = document.getElementById('genre-filter');
      const genres = CONFIG.tags.categories.genre.options;
      genres.forEach(genre => {
        const option = document.createElement('option');
        option.value = genre;
        option.textContent = genre;
        select.appendChild(option);
      });
    }

    // ============================================
    // INIT
    // ============================================

    populateGenreFilter();
    loadStories();
    checkAuth();
  </script>
</body>
</html>
