services:
  - type: web
    name: wordflaneur
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        # Set this to your Supabase project URL in the Render dashboard (secret)
        isSecret: true
      - key: SUPABASE_ANON_KEY
        # Set this to your Supabase anon/public key in the Render dashboard (secret)
        isSecret: true
