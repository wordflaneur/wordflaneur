<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — WordFlaneur</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4efe6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 350px;
        }
        h1 {
            color: #3d2b1f;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #6b4f3c;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #8b6f5a;
        }
        #message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .toggle-link {
            text-align: center;
            margin-top: 15px;
        }
        .toggle-link a {
            color: #6b4f3c;
            cursor: pointer;
            text-decoration: underline;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📜 WordFlaneur</h1>
    <h2 id="form-title">Sign In</h2>

    <form id="auth-form">
        <!-- Display Name (only for signup) -->
        <div id="name-group" class="hidden">
            <input type="text" id="display-name" placeholder="Display Name" />
        </div>

        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />

        <!-- Confirm Password (only for signup) -->
        <div id="confirm-group" class="hidden">
            <input type="password" id="confirm-password" placeholder="Confirm Password" />
        </div>

        <button type="submit" id="submit-btn">Sign In</button>
    </form>

    <div id="message"></div>

    <div class="toggle-link">
        <span id="toggle-text">Don't have an account?</span>
        <a id="toggle-link">Sign Up</a>
    </div>

    <div style="text-align:center; margin-top:20px; font-size:13px; color:#7a6b5a;">
        Demo: admin@wordflaneur.com / admin123
    </div>
</div>

<script>
    // ============================================
    // 🔐 YOUR SUPABASE CREDENTIALS
    // ============================================

    const supabase = window.supabase.createClient(
        process.env.SUPABASE_URL, 
        process.env.SUPABASE_ANON_KEY
    );

    // ============================================
    // 🧠 STATE
    // ============================================
    let isLogin = true;

    // ============================================
    // 📤 FORM SUBMIT
    // ============================================
    document.getElementById('auth-form').addEventListener('submit', async function(e) {
        e.preventDefault(); // ✅ Prevents page reload

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const displayName = document.getElementById('display-name').value.trim();
        const confirmPassword = document.getElementById('confirm-password').value;
        const msg = document.getElementById('message');

        msg.textContent = '';
        msg.className = '';

        // --- Validation ---
        if (!email || !password) {
            msg.textContent = '❌ Please fill in all fields.';
            msg.className = 'error';
            return;
        }

        if (!isLogin) {
            if (password !== confirmPassword) {
                msg.textContent = '❌ Passwords do not match.';
                msg.className = 'error';
                return;
            }
            if (password.length < 6) {
                msg.textContent = '❌ Password must be at least 6 characters.';
                msg.className = 'error';
                return;
            }
            if (!displayName) {
                msg.textContent = '❌ Please enter a display name.';
                msg.className = 'error';
                return;
            }
        }

        try {
            if (isLogin) {
                // ===== SIGN IN =====
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                msg.textContent = '✅ Welcome back! Redirecting...';
                msg.className = 'success';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } else {
                // ===== SIGN UP =====
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            display_name: displayName,
                            username: displayName.toLowerCase().replace(/\s/g, '')
                        }
                    }
                });

                if (error) throw error;

                if (data.user) {
                    msg.textContent = '✅ Account created! You can now sign in.';
                    msg.className = 'success';
                    // Switch to login mode
                    if (!isLogin) toggleMode();
                    document.getElementById('password').value = '';
                    document.getElementById('confirm-password').value = '';
                } else {
                    msg.textContent = '⚠️ Please check your email to confirm.';
                    msg.className = 'error';
                }
            }

        } catch (error) {
            msg.textContent = '❌ ' + error.message;
            msg.className = 'error';
            console.error('Auth error:', error);
        }
    });

    // ============================================
    // 🔄 TOGGLE LOGIN / SIGNUP
    // ============================================
    function toggleMode() {
        isLogin = !isLogin;

        document.getElementById('form-title').textContent = isLogin ? 'Sign In' : 'Create Account';
        document.getElementById('submit-btn').textContent = isLogin ? 'Sign In' : 'Sign Up';
        document.getElementById('toggle-text').textContent = isLogin ? "Don't have an account?" : 'Already have an account?';
        document.getElementById('toggle-link').textContent = isLogin ? 'Sign Up' : 'Sign In';

        document.getElementById('name-group').classList.toggle('hidden', isLogin);
        document.getElementById('confirm-group').classList.toggle('hidden', isLogin);
    }

    document.getElementById('toggle-link').addEventListener('click', toggleMode);
</script>

</body>
</html>
